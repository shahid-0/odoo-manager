name: Build & Publish to Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"         # Trigger on version tags like v1.0.0
  pull_request:
    branches:
      - main
      - master           # Build (but don't push) on PRs to validate the Dockerfile

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout source code ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU for multi-platform builds (linux/amd64 + linux/arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx (needed for multi-platform + cache support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub (skipped on pull_request events) ─────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Generate smart image tags & labels ─────────────────────────────
      #   On push to main/master  → :latest  +  :<short-sha>
      #   On push of tag v1.2.3   → :1.2.3   +  :1.2        +  :1  +  :latest
      #   On pull_request         → build-only, no push
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/odoo-manager
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 6. Build and push ─────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64   # Supports both x86 servers & Apple Silicon
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                 # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      # ── 7. Print a summary ───────────────────────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "### ✅ Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
